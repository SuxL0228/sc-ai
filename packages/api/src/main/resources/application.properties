server.port=${PORT:8080}
spring.application.name=ai-clash-api

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ai-clash}?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQL_USER:ai_clash}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jackson.default-property-inclusion=non_null

app.public-site-url=${PUBLIC_SITE_URL:http://localhost:5173}
app.cors-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://127.0.0.1:5174}
app.max-share-bytes=${MAX_SHARE_BYTES:524288}
app.share-default-ttl-days=${SHARE_DEFAULT_TTL_DAYS:0}
