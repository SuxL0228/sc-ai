name: Deploy API

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
      ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
      ACR_REPOSITORY: sc-ai-api
      REMOTE_DIR: ${{ secrets.API_REMOTE_DIR || '/opt/sc-ai-api' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login "$ACR_REGISTRY" -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          IMAGE="$ACR_REGISTRY/$ACR_NAMESPACE/$ACR_REPOSITORY"
          docker build -f packages/api/Dockerfile -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .

      - name: Push image
        run: |
          IMAGE="$ACR_REGISTRY/$ACR_NAMESPACE/$ACR_REPOSITORY"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

