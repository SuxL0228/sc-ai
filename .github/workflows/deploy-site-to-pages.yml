name: Deploy Site to Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/site/**'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: cd packages/site && bun install

      - name: Build site
        run: cd packages/site && bun run build
        env:
          BASE_URL: /sc-ai/

      - name: Add offline package to site assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ASSET_NAME="crx-sc-ai-${VERSION}.zip"
          DOWNLOAD_NAME="sc-ai-v${VERSION}.zip"
          RELEASE_DIR="/tmp/sc-ai-release"

          mkdir -p "$RELEASE_DIR" packages/site/dist/downloads
          if ! gh release download "v${VERSION}" --repo "$GITHUB_REPOSITORY" --pattern "$ASSET_NAME" --dir "$RELEASE_DIR"; then
            gh release download --repo "$GITHUB_REPOSITORY" --pattern "$ASSET_NAME" --dir "$RELEASE_DIR"
          fi

          cp "${RELEASE_DIR}/${ASSET_NAME}" "packages/site/dist/downloads/${DOWNLOAD_NAME}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
