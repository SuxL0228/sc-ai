name: Release Browser Extension

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      OSS_SECRET_ACCESS_KEY: ${{ secrets.OSS_SECRET_ACCESS_KEY }}
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_REGION: ${{ secrets.OSS_REGION || 'us-east-1' }}
      OSS_PATH: ${{ secrets.OSS_PATH || '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension
        run: bun run build

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ./release/crx-sc-ai-${{ steps.get_version.outputs.version }}.zip

      - name: Install OSS tools
        if: ${{ env.OSS_ACCESS_KEY_ID != '' && env.OSS_SECRET_ACCESS_KEY != '' && env.OSS_ENDPOINT != '' && env.OSS_BUCKET != '' }}
        run: |
          if [[ "$OSS_ENDPOINT" =~ aliyuncs\.com ]]; then
            wget -q https://gosspublic.alicdn.com/ossutil/1.7.14/ossutil64 -O ossutil
            chmod +x ossutil
            sudo mv ossutil /usr/local/bin/
          elif ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install --update
          fi

      - name: Upload offline package to OSS
        if: ${{ env.OSS_ACCESS_KEY_ID != '' && env.OSS_SECRET_ACCESS_KEY != '' && env.OSS_ENDPOINT != '' && env.OSS_BUCKET != '' }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          SOURCE="./release/crx-sc-ai-${VERSION}.zip"
          TARGET_FILE="sc-ai-v${VERSION}.zip"
          export AWS_ACCESS_KEY_ID="$OSS_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$OSS_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="$OSS_REGION"

          if [ -n "$OSS_PATH" ]; then
            OBJECT_PATH="${OSS_PATH%/}/downloads/${TARGET_FILE}"
          else
            OBJECT_PATH="downloads/${TARGET_FILE}"
          fi

          if [[ "$OSS_ENDPOINT" =~ aliyuncs\.com ]]; then
            ossutil cp "$SOURCE" "oss://${OSS_BUCKET}/${OBJECT_PATH}" \
              -e "$OSS_ENDPOINT" \
              -i "$OSS_ACCESS_KEY_ID" \
              -k "$OSS_SECRET_ACCESS_KEY" \
              -f
          else
            aws s3 cp "$SOURCE" "s3://${OSS_BUCKET}/${OBJECT_PATH}" \
              --endpoint-url "$OSS_ENDPOINT" \
              --region "$OSS_REGION"
          fi
